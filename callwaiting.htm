<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正區社會課等待人數</title>
    <style>
        body {
            background-color: #000;
            color: #32CD32;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .card {
            background: #0a150a;
            border: 0.6vw solid #1b4d1b;
            border-radius: 3vw;
            width: 95vw;
            height: 90vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            box-shadow: 0 0 5vw rgba(0, 255, 0, 0.1);
            padding: 2vh 2vw;
        }

        .header {
            flex: 0.8;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .dept-title { font-size: clamp(2rem, 4vw, 3.5rem); font-weight: bold; letter-spacing: 2px; }

        .main-content {
            flex: 8;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 2vw;
        }

        .data-column {
            flex: 1;
            height: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 2vw;
        }

        .col-left { border-right: 1px solid #1b4d1b; }
        
        .label { 
            font-size: clamp(1.5rem, 3.5vw, 2.8rem); 
            color: #1b7a1b; 
            font-weight: bold;
            margin-bottom: 2vh;
        }
        
        .number-box { display: flex; align-items: baseline; line-height: 0.8; }
        
        .num-call { 
            font-size: clamp(8rem, 25vw, 45vh); 
            color: #006400; 
            font-weight: 900; 
            text-shadow: none; 
        }
        
        .num-wait { 
            font-size: clamp(8rem, 25vw, 45vh); 
            color: #39FF14; 
            font-weight: 900; 
            text-shadow: 0 0 4vw rgba(57, 255, 20, 0.6); 
        }
        
        .unit { font-size: clamp(2rem, 4vw, 4rem); margin-left: 1vw; color: #1b7a1b; }

        .footer {
            flex: 1.5;
            border-top: 1px solid #1b4d1b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 1vh 2vw 0;
            gap: 1.5vh;
        }

        .footer-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* 置中資料來源行 */
        .footer-bottom {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            gap: 10px;
        }

        .update-time { font-size: clamp(1rem, 2vw, 1.8rem); color: #1b4d1b; }
        
        .btn-style { 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            color: #32CD32;
            padding: 0.8vh 1.5vw;
            background: rgba(57, 255, 20, 0.05);
            border-radius: 10px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-style:hover { background: rgba(57, 255, 20, 0.15); }
        
        .btn-text { font-size: clamp(0.9rem, 1.8vw, 1.5rem); font-weight: bold; margin-right: 10px; }
        .refresh-icon, .link-icon { fill: #39FF14; width: clamp(20px, 3vw, 30px); height: clamp(20px, 3vw, 30px); }
        
        .source-label { font-size: clamp(0.9rem, 1.8vw, 1.5rem); color: #1b4d1b; font-weight: bold; }

        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="dept-title">中正區公所 - 社會課</div>
        </div>

        <div class="main-content">
            <div class="data-column col-left">
                <div class="label">目前叫號</div>
                <div class="number-box">
                    <div id="current-num" class="num-call">--</div>
                    <div class="unit">號</div>
                </div>
            </div>
            
            <div class="data-column">
                <div class="label">等待人數</div>
                <div class="number-box">
                    <div id="wait-count" class="num-wait">--</div>
                    <div class="unit">人</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-top">
                <div id="update-time" class="update-time">最後同步：--:--:--</div>
                <div class="btn-style" onclick="updateData()">
                    <span class="btn-text">重新讀取人數</span>
                    <svg class="refresh-icon" id="refresh-icon" viewBox="0 0 24 24">
                        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                </div>
            </div>
            
            <div class="footer-bottom">
                <span class="source-label">資料來源：</span>
                <a href="https://cloud.taipei/web_toe_getIframeContent" target="_blank" class="btn-style">
                    <span class="btn-text">台北市區公所櫃檯叫號進度查詢</span>
                    <svg class="link-icon" viewBox="0 0 24 24">
                        <path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwqX87AUxr4WxpRndnwyuGHM7ZfKBRrlH1k5RcXrkXBDPQjywsBDHbKse7WaJHvk2EF/exec";
        let isFetching = false;

        async function updateData() {
            if (isFetching) return;
            isFetching = true;
            document.getElementById('refresh-icon').classList.add('loading-spin');

            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                if(data.error) throw data.error;

                document.getElementById('current-num').innerText = data.currentNum;
                document.getElementById('wait-count').innerText = data.waitCount;
                document.getElementById('update-time').innerText = `最後同步：${data.updateTime}`;
                
            } catch (err) {
                document.getElementById('update-time').innerText = "連線失敗";
            } finally {
                setTimeout(() => {
                    document.getElementById('refresh-icon').classList.remove('loading-spin');
                    isFetching = false;
                }, 600);
            }
        }

        setInterval(updateData, 30000);
        updateData();
    </script>
</body>
</html>
